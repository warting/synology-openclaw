name: publish feed

on:
  push:
    branches: [main]
    paths:
      - "feed/**"
      - ".github/workflows/pages.yml"
      - "feed.sh"
      - "src/PACKAGE_ICON*.PNG"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Regenerate feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./feed.sh > feed/packages.json

      - name: Show feed
        run: cat feed/packages.json

      - name: Copy icons into feed
        run: |
          cp src/PACKAGE_ICON.PNG feed/icon_72.png || true
          cp src/PACKAGE_ICON_256.PNG feed/icon_256.png || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: feed

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
