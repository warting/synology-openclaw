name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          raw="${GITHUB_REF_NAME#v}"
          build="$(date +%Y%m%d%H%M)"
          version="${raw}-${build}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Build .spk
        run: ./build.sh "${{ steps.version.outputs.version }}"

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: spk
          path: build/*.spk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spk
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.spk
          generate_release_notes: true

  publish-feed:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Regenerate feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./feed.sh > feed/packages.json

      - name: Show feed
        run: cat feed/packages.json

      - name: Copy icons into feed
        run: |
          cp src/PACKAGE_ICON.PNG feed/icon_72.png || true
          cp src/PACKAGE_ICON_256.PNG feed/icon_256.png || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: feed

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
