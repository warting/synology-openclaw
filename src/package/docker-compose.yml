services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped

    # __UI_PORT__ is substituted by scripts/postinst at install time using
    # the value collected in the install wizard.
    ports:
      - "__UI_PORT__:18789"

    environment:
      OPENCLAW_SANDBOX: "0"
      OPENCLAW_BIND: "0.0.0.0"

    volumes:
      - /volume1/docker/openclaw/config:/home/node/.openclaw
      - /volume1/docker/openclaw/workspace:/home/node/.openclaw/workspace

    # Deliberately NOT mounting /var/run/docker.sock.
    # Model providers (Anthropic, OpenAI, Ollama, LM Studio, ...) are
    # configured from within OpenClaw's own UI, not via env vars here.
